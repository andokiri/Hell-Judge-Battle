<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地獄の審判 - 悪行バトル</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>地獄の審判</h1>
            <p class="subtitle">顔写真をアップロードせよ。人相からその者の闘を暴く</p>
        </header>

        <div id="game-setup">
            <div class="player-setup">
                <div class="player-card" id="card-a">
                    <h2>罪人A</h2>
                    <div class="upload-area" id="upload-a" onclick="document.getElementById('file-a').click()">
                        <div class="upload-placeholder" id="placeholder-a">
                            <div class="upload-icon">📷</div>
                            <span>顔写真をアップロード</span>
                        </div>
                        <img id="preview-a" class="photo-preview" style="display:none">
                    </div>
                    <input type="file" id="file-a" accept="image/*" style="display:none" onchange="handleFileSelect('a', this)">
                    <div id="profile-a" class="profile-card" style="display:none"></div>
                </div>
                <div class="vs">VS</div>
                <div class="player-card" id="card-b">
                    <h2>罪人B</h2>
                    <div class="upload-area" id="upload-b" onclick="document.getElementById('file-b').click()">
                        <div class="upload-placeholder" id="placeholder-b">
                            <div class="upload-icon">📷</div>
                            <span>顔写真をアップロード</span>
                        </div>
                        <img id="preview-b" class="photo-preview" style="display:none">
                    </div>
                    <input type="file" id="file-b" accept="image/*" style="display:none" onchange="handleFileSelect('b', this)">
                    <div id="profile-b" class="profile-card" style="display:none"></div>
                </div>
            </div>
            <div id="setup-loading" style="display:none">
                <div class="loading-spinner"></div>
                <p id="setup-loading-text">人相を鑑定中...</p>
            </div>
            <button id="start-btn" onclick="startGame()" disabled>裁きを始める</button>
        </div>

        <div id="game-area" style="display: none;">
            <div class="battle-header">
                <div class="battle-player" id="battle-player-a">
                    <img id="battle-img-a" class="battle-avatar">
                    <span class="battle-name" id="battle-name-a"></span>
                    <span class="confession-count" id="count-a">0回</span>
                </div>
                <div class="battle-info">
                    <div class="win-streak" id="win-streak" style="display:none"></div>
                    <div class="round-display">
                        第 <span id="round-num">1</span> 回戦
                    </div>
                </div>
                <div class="battle-player" id="battle-player-b">
                    <img id="battle-img-b" class="battle-avatar">
                    <span class="battle-name" id="battle-name-b"></span>
                    <span class="confession-count" id="count-b">0回</span>
                </div>
            </div>

            <div id="history-area"></div>

            <div id="battle-loading" style="display: none;">
                <div class="loading-spinner"></div>
                <p id="battle-loading-text">告白を生成中...</p>
            </div>

            <div id="next-round-btn-area" style="display:none">
                <button id="next-round-btn" onclick="nextRound()">次の告白へ</button>
            </div>
        </div>

        <div id="result-area" style="display: none;">
            <div class="result-box">
                <h2>最終判定</h2>
                <p id="final-comment"></p>
                <div class="winner-announce">
                    <img id="winner-img" class="winner-avatar">
                    <div>
                        <span class="winner-label">勝者</span>
                        <span id="winner-name" class="winner-name"></span>
                        <span class="streak-badge" id="streak-badge"></span>
                    </div>
                </div>

                <div class="loser-announce">
                    <img id="loser-img" class="loser-avatar">
                    <div>
                        <span class="loser-label">敗者（退場）</span>
                        <span id="loser-name" class="loser-name"></span>
                    </div>
                </div>

                <div class="challenger-section">
                    <h3>次の挑戦者を送り込め</h3>
                    <div class="challenger-upload">
                        <div class="upload-area challenger-upload-area" id="upload-challenger" onclick="document.getElementById('file-challenger').click()">
                            <div class="upload-placeholder" id="placeholder-challenger">
                                <div class="upload-icon">📷</div>
                                <span>挑戦者の顔写真</span>
                            </div>
                            <img id="preview-challenger" class="photo-preview" style="display:none">
                        </div>
                        <input type="file" id="file-challenger" accept="image/*" style="display:none" onchange="handleChallengerSelect(this)">
                        <div id="profile-challenger" class="profile-card" style="display:none"></div>
                    </div>
                    <div id="challenger-loading" style="display:none">
                        <div class="loading-spinner"></div>
                        <p>挑戦者の人相を鑑定中...</p>
                    </div>
                    <button id="next-battle-btn" onclick="startNextBattle()" disabled>次の裁きへ</button>
                </div>

                <div class="reset-section">
                    <button class="reset-btn" onclick="resetGame()">最初からやり直す</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
